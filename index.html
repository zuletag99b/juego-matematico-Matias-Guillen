<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boliche Matemático PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(270deg, #ff6ec4, #7873f5, #42e695);
    background-size: 600% 600%;
    animation: fondo 10s ease infinite;
    overflow: hidden;
}

@keyframes fondo {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ================= INICIO PRO ================= */
#inicio {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.card-inicio {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: white;
    max-width: 400px;
}

.card-inicio h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.card-inicio p {
    font-size: 16px;
    line-height: 1.4;
}

.play-btn {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg,#00f2fe,#4facfe);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.play-btn:hover {
    transform: scale(1.05);
}

/* ================= UI ================= */
#ui {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
}

#card {
    background: rgba(0,0,0,0.6);
    display: inline-block;
    padding: 12px 18px;
    border-radius: 15px;
}

#question {
    font-size: 5vw;
}

/* ================= BOTONES RESPONSIVE ================= */
#answers {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.btn {
    padding: 15px;
    font-size: 6vw;
    border-radius: 15px;
    background: linear-gradient(45deg,#ffdd00,#ff8800);
    text-align: center;
}

/* MENSAJE */
#mensaje {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 7vw;
    font-weight: bold;
}

/* ================= DESKTOP ================= */
@media(min-width:768px){
    #question { font-size: 28px; }
    .btn { font-size: 24px; }
    #mensaje { font-size: 35px; }
    #answers {
        grid-template-columns: repeat(3, 1fr);
        max-width: 600px;
        margin: auto;
    }
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
    <div class="card-inicio">
        <h1>🎳 Boliche Matemático</h1>
        <p>
        Aprende la relación entre suma y resta con un valor constante.
        Resuelve patrones, ecuaciones y secuencias mientras juegas.
        </p>
        <p><b>Autor:</b> Matías Josué Guillén Zuleta</p>
        <button class="play-btn" onclick="startGame()">▶️ Jugar</button>
    </div>
</div>

<div id="ui">
    <div id="card">
        <div id="score">⭐ Puntos: 0</div>
        <div id="question"></div>
    </div>
</div>

<div id="mensaje"></div>
<div id="answers"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
function startGame(){
    document.getElementById("inicio").style.display="none";
    nuevaPregunta();
}

// ESCENA
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});

renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let light=new THREE.PointLight(0xffffff,2);
light.position.set(0,10,5);
scene.add(light);

let floor=new THREE.Mesh(
    new THREE.PlaneGeometry(30,30),
    new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

let player=new THREE.Mesh(
    new THREE.SphereGeometry(0.8,32,32),
    new THREE.MeshStandardMaterial({color:0xff00ff,emissive:0x550055})
);
player.position.y=0.8;
scene.add(player);

camera.position.set(0,6,8);
camera.lookAt(0,0,0);

// BOLOS
let pins=[];
function crearBolos(){
    pins.forEach(p=>scene.remove(p));
    pins=[];
    [-1,0,1].forEach((x)=>{
        let pin=new THREE.Mesh(
            new THREE.CylinderGeometry(0.2,0.3,1.5,32),
            new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
        );
        pin.position.set(x,0.75,-6);
        scene.add(pin);
        pins.push(pin);
    });
}
crearBolos();

// SONIDO
function beep(f){
    let ctx=new AudioContext();
    let o=ctx.createOscillator();
    o.frequency.value=f;
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),150);
}

// MENSAJE
function mensaje(t,c){
    let m=document.getElementById("mensaje");
    m.innerText=t;
    m.style.color=c;
    setTimeout(()=>m.innerText="",1000);
}

// TIRO
function tiro(ok){
    let t=0;
    let anim=setInterval(()=>{
        t+=0.05;
        player.position.z=-6*t;
        if(!ok) player.position.x=2;

        if(t>=1){
            clearInterval(anim);
            if(ok){
                pins.forEach(p=>p.rotation.z+=Math.random());
                mensaje("🎳 CHUZA!", "lime");
                puntos++;
            }else{
                mensaje("❌ Intenta", "red");
            }

            document.getElementById("score").innerText="⭐ "+puntos;

            setTimeout(()=>{
                player.position.set(0,0.8,0);
                crearBolos();
            },600);
        }
    },20);
}

// LOGICA
let puntos=0;
let correcta;

function nuevaPregunta(){
    let base=Math.floor(Math.random()*50)+10;
    let c=Math.floor(Math.random()*9)+2;

    correcta=base;
    let texto=`Si ${base}+${c}=${base+c}, entonces ${base+c}-${c}=?`;

    document.getElementById("question").innerText=texto;

    let opciones=[correcta];
    while(opciones.length<4){
        let f=correcta+(Math.random()*10|0)-5;
        if(!opciones.includes(f)) opciones.push(f);
    }

    opciones.sort(()=>Math.random()-0.5);

    let cont=document.getElementById("answers");
    cont.innerHTML="";

    opciones.forEach(n=>{
        let b=document.createElement("div");
        b.className="btn";
        b.innerText=n;
        b.onclick=()=>{
            beep(n==correcta?900:200);
            tiro(n==correcta);
            setTimeout(nuevaPregunta,1200);
        };
        cont.appendChild(b);
    });
}

// RENDER
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
