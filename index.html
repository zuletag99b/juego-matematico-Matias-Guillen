<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boliche Matemático PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Arial';
    background: linear-gradient(270deg, #ff6ec4, #7873f5, #42e695);
    background-size: 600% 600%;
    animation: fondo 10s ease infinite;
    overflow: hidden;
}

@keyframes fondo {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 10;
}

#card {
    display: inline-block;
    background: rgba(0,0,0,0.6);
    padding: 15px 25px;
    border-radius: 20px;
}

#question {
    font-size: 32px;
    margin: 10px;
}

#score {
    font-size: 22px;
}

/* botones */
#answers {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 18px 28px;
    font-size: 26px;
    border-radius: 20px;
    background: linear-gradient(45deg,#ffdd00,#ff8800);
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.1);
    background: linear-gradient(45deg,#00f2fe,#4facfe);
    color: white;
}

/* mensaje */
#mensaje {
    position: absolute;
    top: 45%;
    width: 100%;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    z-index: 20;
}
canvas { display:block; }
</style>
</head>

<body>

<div id="ui">
    <div id="card">
        <div id="score">⭐ Puntos: 0</div>
        <div id="question"></div>
        <div>🎯 Encuentra el patrón</div>
    </div>
</div>

<div id="mensaje"></div>
<div id="answers"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// escena
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz
let light = new THREE.PointLight(0xffffff, 2);
light.position.set(0,10,5);
scene.add(light);

// piso
let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(30,30),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// bola brillante
let player = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 32, 32),
    new THREE.MeshStandardMaterial({
        color: 0xff00ff,
        emissive: 0x550055
    })
);
player.position.y = 0.8;
scene.add(player);

// cámara
camera.position.set(0,6,8);
camera.lookAt(0,0,0);

// bolos de colores
let pins = [];

function crearBolos(){
    pins.forEach(p => scene.remove(p));
    pins = [];

    let colores = [0xff0000,0x00ff00,0x0000ff];

    [-1,0,1].forEach((x,i)=>{
        let pin = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.3, 1.5, 32),
            new THREE.MeshStandardMaterial({ color: colores[i] })
        );

        pin.position.set(x, 0.75, -6);
        scene.add(pin);
        pins.push(pin);
    });
}
crearBolos();

// sonido
function beep(freq){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.frequency.value = freq;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),200);
}

// mensaje
function mensaje(texto, color){
    let m = document.getElementById("mensaje");
    m.innerText = texto;
    m.style.color = color;

    setTimeout(()=> m.innerText="",1200);
}

// chuza
function chuza(){
    pins.forEach((pin,i)=>{
        let dir = (i-1)*0.4;

        let t=0;
        let anim=setInterval(()=>{
            t+=0.1;
            pin.rotation.z +=0.4;
            pin.position.x += dir;
            pin.position.z +=0.4;

            if(t>1) clearInterval(anim);
        },30);
    });
}

// tiro
function tiro(correcto){
    let t=0;

    let anim=setInterval(()=>{
        t+=0.05;
        player.position.z = -6*t;

        if(!correcto) player.position.x=2;

        if(t>=1){
            clearInterval(anim);

            if(correcto){
                chuza();
                mensaje("🎳 CHUZAAAAA 🔥🔥🔥","lime");
                puntos++;
            }else{
                mensaje("❌ CASI... INTENTA","red");
            }

            document.getElementById("score").innerText="⭐ Puntos: "+puntos;

            setTimeout(()=>{
                player.position.set(0,0.8,0);
                crearBolos();
            },800);
        }
    },20);
}

// lógica avanzada
let puntos=0;
let constante = Math.floor(Math.random()*7)+2;
let tipo = Math.random()>0.5?"+":"-";
let correcta;

    let base = Math.floor(Math.random()*40)+10;

    correcta = tipo==="+"? base+constante: base-constante;

    document.getElementById("question").innerText =
        `${base} ${tipo} ${constante} = ?`;

    let opciones=[correcta];

    while(opciones.length<3){
        let falsa = correcta + (Math.floor(Math.random()*6)-3)*2;
        if(!opciones.includes(falsa)) opciones.push(falsa);
    }

    opciones.sort(()=>Math.random()-0.5);

    let cont=document.getElementById("answers");
    cont.innerHTML="";

    opciones.forEach(num=>{
        let btn=document.createElement("div");
        btn.className="btn";
        btn.innerText=num;

        btn.onclick=()=>{
            beep(num===correcta?900:200);
            tiro(num===correcta);
            setTimeout(nuevaPregunta,1200);
        };

        cont.appendChild(btn);
    });
}*/

function nuevaPregunta(){

    let base = Math.floor(Math.random()*60)+20; // 20 a 80
    let constante = Math.floor(Math.random()*7)+3; // 3 a 9

    let tipoRandom = Math.random();
    let texto = "";
    
    // 3 tipos de ejercicios
    if(tipoRandom < 0.4){
        // SUMA
        correcta = base + constante;
        texto = `${base} + ${constante} = ?`;

    } else if(tipoRandom < 0.8){
        // RESTA
        correcta = base - constante;
        texto = `${base} - ${constante} = ?`;

    } else {
        // RELACIÓN (clave educativa)
        correcta = base;
        texto = `(${base} + ${constante}) - ${constante} = ?`;
    }

    document.getElementById("question").innerText = texto;

    let opciones = [correcta];

    // respuestas incorrectas más inteligentes
    while(opciones.length < 3){

        let errorTipo = Math.floor(Math.random()*3);
        let falsa;

        if(errorTipo === 0){
            // error común: sumar en vez de restar
            falsa = base + constante;
        } 
        else if(errorTipo === 1){
            // error común: restar mal
            falsa = base - constante;
        } 
        else {
            // variación cercana
            falsa = correcta + (Math.floor(Math.random()*5)-2)*2;
        }

        if(!opciones.includes(falsa)){
            opciones.push(falsa);
        }
    }

    opciones.sort(()=>Math.random()-0.5);

    let cont = document.getElementById("answers");
    cont.innerHTML = "";

    opciones.forEach(num=>{
        let btn = document.createElement("div");
        btn.className = "btn";
        btn.innerText = num;

        btn.onclick = ()=>{
            beep(num===correcta?900:200);
            tiro(num===correcta);
            setTimeout(nuevaPregunta,1200);
        };

        cont.appendChild(btn);
    });
}

nuevaPregunta();

// render
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

// responsive
window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
